when:
  - event: push
    branch: main

labels:
  repo: PineIT-ca/pinemeter
  platform: darwin/arm64
  backend: local
  hostname: macvm-pinemeter
  trust: public-main-only

steps:
  xcode-tests:
    image: /bin/bash
    commands:
      - set -euo pipefail
      - test "$(uname -s)" = Darwin
      - test "$(uname -m)" = arm64
      - xcodebuild -version
      - ci_keychain="$CI_WORKSPACE/.woodpecker-ci.keychain-db"
      - derived_data="$CI_WORKSPACE/.derived-data"
      - cleanup() { security delete-keychain "$ci_keychain" >/dev/null 2>&1 || rm -f "$ci_keychain"; }
      - trap cleanup EXIT
      - security create-keychain -p woodpecker-ci-ephemeral "$ci_keychain"
      - security set-keychain-settings -lut 21600 "$ci_keychain"
      - security unlock-keychain -p woodpecker-ci-ephemeral "$ci_keychain"
      - security list-keychains -d user -s "$ci_keychain"
      - security default-keychain -d user -s "$ci_keychain"
      - xcodebuild build-for-testing -project Pinemeter.xcodeproj -scheme Pinemeter -configuration Debug -derivedDataPath "$derived_data" CODE_SIGN_IDENTITY=- CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
      - test_bundle="$derived_data/Build/Products/Debug/Pinemeter.app/Contents/PlugIns/PinemeterTests.xctest"
      - test -d "$test_bundle"
      - DYLD_LIBRARY_PATH="$derived_data/Build/Products/Debug/Pinemeter.app/Contents/MacOS:$derived_data/Build/Products/Debug" /Applications/Xcode.app/Contents/Developer/usr/bin/xctest "$test_bundle"
